apiVersion: argoproj.io/v1alpha1
kind: Application

metadata:
  name: python-api
  namespace: argocd

spec:
  project: default

  source:
    repoURL: "https://github.com/mtmthelast/redis-assignment-gitops.git"
    targetRevision: HEAD
    path: redis-assignment-gitops/

  destination:
    server: https://kubernetes.default.svc
    namespace: default

  syncPolicy:
    automated:
      prune: true
      selfHeal: true

    syncOptions:
      - CreateNamespace=true