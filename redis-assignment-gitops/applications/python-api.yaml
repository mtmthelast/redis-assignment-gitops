apiVersion: argoproj.io/v1alpha1
kind: Application

metadata:
  name: python-api
  namespace: argocd

spec:
  project: default

  source:
    repoURL: https://github.com/mtmthelast/redis-assignment-gitops.git
    targetRevision: main
    path: python-api

  destination:
    server: https://kubernetes.default.svc
    namespace: default

  syncPolicy:
    automated:
      prune: true
      selfHeal: true

    syncOptions:
      - CreateNamespace=true