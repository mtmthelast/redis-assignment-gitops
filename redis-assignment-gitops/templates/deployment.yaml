apiVersion: apps/v1
kind: Deployment

metadata:
  name: python-api

spec:
  replicas: {{ .Values.replicaCount }}

  selector:
    matchLabels:
      app: python-api

  template:
    metadata:
      labels:
        app: python-api

    spec:
      containers:
      - name: python-api

        image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"

        imagePullPolicy: {{ .Values.image.pullPolicy }}

        ports:
        - containerPort: 8000

        envFrom:
        - configMapRef:
            name: redis-cm

        - secretRef:
            name: redis-secret